<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やる夫は奇妙なゾンビ世界で人類復興を目指すようです 第一話</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f9f9f9;
      color: #333;
    }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    h2 { font-size: 1rem; margin-bottom: 10px; color: #555; }
    .back {
      display: inline-block;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #888;
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }
    .notice {
      background: #fff8e1;
      border-left: 3px solid #ffc107;
      padding: 12px 16px;
      margin-bottom: 28px;
      white-space: pre-wrap;
      font-size: 0.9rem;
      line-height: 1.6;
      border-radius: 0 4px 4px 0;
    }
    ul { list-style: none; padding: 0; }
    li { margin: 8px 0; }
    a { text-decoration: none; color: #0066cc; }
    a:visited { color: #663399; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <a class="back" href="../../">← 返回首頁</a>
  <h1>やる夫は奇妙なゾンビ世界で人類復興を目指すようです 第一話</h1>

  <h2>公告</h2>
  <div class="notice" id="notice">讀取中…</div>

  <div style="margin-bottom: 28px; display: flex; align-items: center; gap: 12px;">
    <label for="bg-color" style="font-size: 0.9rem; color: #555;">網頁底色</label>
    <input type="color" id="bg-color" value="#ffffff"
      style="width: 40px; height: 32px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; padding: 2px;">
    <button id="reset-color"
      style="font-size: 0.8rem; color: #888; background: none; border: 1px solid #ccc; border-radius: 4px; padding: 4px 10px; cursor: pointer;">
      重設
    </button>
  </div>

  <h2>作品列表</h2>
  <ul>
    <li><a href="やる夫は奇妙なゾンビ世界で人類復興を目指すようです 第一話 アローンアゲインとダフトパンク 前篇.html">やる夫は奇妙なゾンビ世界で人類復興を目指すようです 第一話 アローンアゲインとダフトパンク 前篇</a></li>
    <li><a href="やる夫は奇妙なゾンビ世界で人類復興を目指すようです 第三話　ザ　サーチャーズ.html">やる夫は奇妙なゾンビ世界で人類復興を目指すようです 第三話　ザ　サーチャーズ</a></li>
    <li><a href="やる夫は奇妙なゾンビ世界で人類復興を目指すようです 第二話 アローンアゲインとダフトパンク 後篇.html">やる夫は奇妙なゾンビ世界で人類復興を目指すようです 第二話 アローンアゲインとダフトパンク 後篇</a></li>
    <li><a href="やる夫は奇妙なゾンビ世界で人類復興を目指すようです 第四話　ビーティアイとランダムアクセスメモリーズ.html">やる夫は奇妙なゾンビ世界で人類復興を目指すようです 第四話　ビーティアイとランダムアクセスメモリーズ</a></li>
  </ul>

  <script>
    fetch('notice.txt?_=' + Date.now())
      .then(r => r.text())
      .then(t => {
        document.getElementById('notice').textContent = t.trim() || '（無公告）';
      })
      .catch(() => {
        document.getElementById('notice').textContent = '（無法載入公告）';
      });

    const picker = document.getElementById('bg-color');
    const resetBtn = document.getElementById('reset-color');
    const KEY = 'pagebgColor';

    const saved = localStorage.getItem(KEY);
    if (saved) {
      document.body.style.backgroundColor = saved;
      picker.value = saved;
    }

    picker.addEventListener('input', () => {
      document.body.style.backgroundColor = picker.value;
      localStorage.setItem(KEY, picker.value);
    });

    resetBtn.addEventListener('click', () => {
      localStorage.removeItem(KEY);
      picker.value = '#ffffff';
      document.body.style.backgroundColor = '';
    });
  </script>
</body>
</html>
